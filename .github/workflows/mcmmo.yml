name: Build mcMMO Latest

on:
  workflow_dispatch: # 允许手动触发构建
  schedule:
    - cron: '0 0 * * 1' # 每周一凌晨 0:00 自动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 克隆 mcMMO 官方仓库的最新主分支代码
      - name: Checkout mcMMO Repository
        uses: actions/checkout@v6
        with:
          repository: 'mcMMO-Dev/mcMMO'
          fetch-depth: 1

      # 2. 配置 JDK 25 编译环境
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # 3. 使用 Maven 编译并打包（启用多线程、跳过测试与文档生成以加速构建）
      - name: Build with Maven
        run: mvn clean package -B -T 1C -DskipTests -Dmaven.javadoc.skip=true

      # 4. 上传编译生成的 JAR 文件
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          path: target/mcMMO.jar
          archive: false # 直接上传单个 JAR 文件，无需打包成 ZIP 压缩包
